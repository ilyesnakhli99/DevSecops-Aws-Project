---
# 1. Update apt cache
- name: Update apt cache
  apt:
    update_cache: yes

# 2. Install OpenJDK 21 and Docker prerequisites
- name: Install prerequisites
  apt:
    name:
      - openjdk-21-jdk
      - docker.io
    state: present

# 3. Start and Enable Docker service
- name: Ensure Docker is running
  service:
    name: docker
    state: started
    enabled: yes

# 4. Add ubuntu user to docker group (so it can run docker commands without sudo)
- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

# 5. Create Jenkins directory on agent machine
- name: Create Jenkins agent workspace directory
  file:
    path: /home/ubuntu/jenkins
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

# 6. Authorize the Master's Public Key to log in over SSH
- name: Authorize Master SSH public key on Agent
  ansible.posix.authorized_key:
    user: ubuntu
    state: present
    key: "{{ hostvars[groups['jenkins_master'][0]]['master_public_key'] }}"